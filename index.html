<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facturación · Calculadora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Variables ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0e14;
      --surface:   #13151f;
      --surface2:  #1c1f2e;
      --border:    #272b3d;
      --accent:    #5bffc8;
      --accent2:   #ff6b6b;
      --accent3:   #ffd166;
      --text:      #e8eaf2;
      --muted:     #6b7194;
      --radius:    14px;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Background grid ────────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(91,255,200,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,255,200,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ─────────────────────────────────────────────────────── */
    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header {
      padding: 48px 0 36px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .header-tag {
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    header h1 {
      font-family: var(--font-head);
      font-size: clamp(28px, 5vw, 46px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -.02em;
    }

    header h1 span { color: var(--accent); }

    header p {
      color: var(--muted);
      margin-top: 10px;
      font-size: 13px;
    }

    /* ── Card ───────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px;
    }

    .card-title {
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Form ───────────────────────────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    label .required { color: var(--accent); margin-left: 2px; }

    input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      width: 100%;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91,255,200,.12);
    }

    input.error {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(255,107,107,.12);
    }

    input::placeholder { color: var(--muted); opacity: .6; }

    /* Quitar flechas de number inputs */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    .field-error {
      font-size: 11px;
      color: var(--accent2);
      min-height: 16px;
    }

    /* ── Button ─────────────────────────────────────────────────────── */
    .btn-calcular {
      width: 100%;
      margin-top: 24px;
      padding: 16px 24px;
      background: var(--accent);
      color: #0c0e14;
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      position: relative;
      overflow: hidden;
    }

    .btn-calcular:hover { opacity: .88; }
    .btn-calcular:active { transform: scale(.98); }

    .btn-calcular:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none;
    }

    .btn-calcular .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,0,0,.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }

    .btn-calcular.loading .btn-label { display: none; }
    .btn-calcular.loading .spinner { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result ─────────────────────────────────────────────────────── */
    #resultado { display: none; }

    #resultado.visible { display: block; animation: slideIn .35s ease; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .result-id {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 700;
    }

    .result-badge {
      font-size: 11px;
      letter-spacing: .1em;
      padding: 4px 10px;
      border-radius: 100px;
      font-weight: 500;
    }

    .badge-ok  { background: rgba(91,255,200,.15); color: var(--accent); border: 1px solid rgba(91,255,200,.3); }
    .badge-err { background: rgba(255,107,107,.15); color: var(--accent2); border: 1px solid rgba(255,107,107,.3); }

    /* Breakdown rows */
    .breakdown { display: flex; flex-direction: column; gap: 2px; }

    .breakdown-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-radius: 8px;
      transition: background .15s;
    }

    .breakdown-row:hover { background: var(--surface2); }

    .breakdown-row .label { color: var(--muted); font-size: 12px; }
    .breakdown-row .value { font-size: 14px; font-weight: 500; }

    .breakdown-row.highlight {
      background: var(--surface2);
      border: 1px solid var(--border);
      margin-top: 4px;
    }

    .breakdown-row.highlight .label { color: var(--text); font-size: 13px; }
    .breakdown-row.highlight .value { color: var(--accent2); font-size: 13px; }

    .breakdown-row.discount .value { color: var(--accent3); }
    .breakdown-row.iva .value { color: var(--accent); }

    /* Total */
    .total-box {
      margin-top: 16px;
      padding: 20px 24px;
      background: linear-gradient(135deg, rgba(91,255,200,.08) 0%, rgba(91,255,200,.02) 100%);
      border: 1px solid rgba(91,255,200,.25);
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total-box .total-label {
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .total-box .total-value {
      font-family: var(--font-head);
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -.02em;
    }

    /* Error message */
    .error-msg {
      text-align: center;
      padding: 24px;
      color: var(--accent2);
      font-size: 13px;
    }

    .error-code {
      font-size: 48px;
      font-family: var(--font-head);
      font-weight: 800;
      opacity: .3;
      display: block;
      margin-bottom: 8px;
    }

    /* ── Footer ─────────────────────────────────────────────────────── */
    footer {
      padding: 24px 0;
      border-top: 1px solid var(--border);
      margin-top: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    footer span { color: var(--muted); font-size: 12px; }

    footer a {
      color: var(--accent);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: .06em;
    }

    footer a:hover { text-decoration: underline; }

    /* ── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 520px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- ── Header ─────────────────────────────────────────────────── -->
  <header>
    <div class="header-tag">// Sistema de facturación</div>
    <h1>Calculadora de<br><span>Factura &amp; IVA</span></h1>
    <p>Descuento aplicado antes del IVA · Validación en tiempo real · HTTP 200 / 404</p>
  </header>

  <main>
    <!-- ── Formulario ─────────────────────────────────────────── -->
    <div class="card">
      <div class="card-title">Datos del producto</div>

      <div class="form-grid">
        <!-- Código -->
        <div class="form-group">
          <label for="codigo">Código<span class="required">*</span></label>
          <input id="codigo" type="text" placeholder="PROD001" maxlength="50" />
          <span class="field-error" id="err-codigo"></span>
        </div>

        <!-- Nombre -->
        <div class="form-group">
          <label for="nombre">Nombre<span class="required">*</span></label>
          <input id="nombre" type="text" placeholder="Laptop Empresarial" maxlength="100" />
          <span class="field-error" id="err-nombre"></span>
        </div>

        <!-- Costo base -->
        <div class="form-group full">
          <label for="costeBase">Costo Base<span class="required">*</span></label>
          <input id="costeBase" type="number" placeholder="1000000" min="0" step="any" />
          <span class="field-error" id="err-costeBase"></span>
        </div>

        <!-- Descuento -->
        <div class="form-group">
          <label for="descuento">Descuento (%)<span class="required">*</span></label>
          <input id="descuento" type="number" placeholder="10" min="0" max="100" step="any" />
          <span class="field-error" id="err-descuento"></span>
        </div>

        <!-- IVA -->
        <div class="form-group">
          <label for="iva">IVA (%)<span class="required">*</span></label>
          <input id="iva" type="number" placeholder="19" min="0" max="100" step="any" />
          <span class="field-error" id="err-iva"></span>
        </div>
      </div>

      <button class="btn-calcular" id="btnCalcular">
        <span class="btn-label">Calcular</span>
        <span class="spinner"></span>
      </button>
    </div>

    <!-- ── Resultado ───────────────────────────────────────────── -->
    <div class="card" id="resultado">
      <!-- contenido inyectado por JS -->
    </div>
  </main>

  <footer>
    <span>Microservicio · Node.js + Express</span>
    <a id="swaggerLink" href="#" target="_blank">Ver documentación API →</a>
  </footer>
</div>

<script>
  /* ── Config ─────────────────────────────────────────────────────────── */
  // En producción reemplaza esta URL con la de Render:
  // En producción (GitHub Pages), reemplaza la URL de Render:
  // const API_BASE = 'https://tu-servicio.onrender.com';

  const _host = window.location.hostname;
  const _isLocal = _host === 'localhost' || _host === '127.0.0.1' || _host === '';
  // _host === '' ocurre cuando abres index.html directamente con file://
  const API_BASE = _isLocal
    ? 'http://localhost:3010'
    : 'https://TU-SERVICIO.onrender.com'; // ← reemplaza antes de subir a GitHub Pages

  document.getElementById('swaggerLink').href = API_BASE + '/api-docs';

  /* ── Referencias DOM ────────────────────────────────────────────────── */
  const btn        = document.getElementById('btnCalcular');
  const resultBox  = document.getElementById('resultado');

  const fields = ['codigo', 'nombre', 'costeBase', 'descuento', 'iva'];

  /* ── Bloquear solo "e/E" en inputs numéricos (el "-" se permite) ───────── */
  ['costeBase', 'descuento', 'iva'].forEach(id => {
    const input = document.getElementById(id);

    // Bloquear únicamente e y E en tiempo real
    input.addEventListener('keydown', e => {
      if (e.key === 'e' || e.key === 'E') e.preventDefault();
    });

    // Limpiar si de alguna forma entra "e" (ej. por autocompletar)
    input.addEventListener('input', () => {
      if (/[eE]/.test(input.value)) input.value = input.value.replace(/[eE]/g, '');
    });

    // Bloquear pegar texto que contenga "e"
    input.addEventListener('paste', e => {
      const pasted = e.clipboardData.getData('text');
      if (/[eE]/.test(pasted)) e.preventDefault();
    });
  });

  /* ── Solo letras/espacios en nombre ─────────────────────────────────────── */
  document.getElementById('nombre').addEventListener('keydown', e => {
    // Permitir teclas de control
    if (e.ctrlKey || e.metaKey || e.key.length > 1) return;
    if (!/^[a-zA-ZáéíóúÁÉÍÓÚñÑüÜ\s]$/.test(e.key)) e.preventDefault();
  });

  /* ── Solo alfanumérico en código ─────────────────────────────────────────── */
  document.getElementById('codigo').addEventListener('keydown', e => {
    if (e.ctrlKey || e.metaKey || e.key.length > 1) return;
    if (!/^[a-zA-Z0-9]$/.test(e.key)) e.preventDefault();
  });

  /* ── Validación cliente ─────────────────────────────────────────────── */
  function clearErrors() {
    fields.forEach(id => {
      document.getElementById(id).classList.remove('error');
      document.getElementById('err-' + id).textContent = '';
    });
  }

  function setError(id, msg) {
    document.getElementById(id).classList.add('error');
    document.getElementById('err-' + id).textContent = msg;
  }

  function validateForm() {
    clearErrors();
    let valid = true;

    const codigo    = document.getElementById('codigo').value.trim();
    const nombre    = document.getElementById('nombre').value.trim();
    const costeBase = document.getElementById('costeBase').value;
    const descuento = document.getElementById('descuento').value;
    const iva       = document.getElementById('iva').value;

    // Código: obligatorio y alfanumérico
    if (!codigo) {
      setError('codigo', 'Campo obligatorio'); valid = false;
    } else if (!/^[a-zA-Z0-9]+$/.test(codigo)) {
      setError('codigo', 'Solo letras y números'); valid = false;
    }

    // Nombre: obligatorio y solo letras/espacios
    if (!nombre) {
      setError('nombre', 'Campo obligatorio'); valid = false;
    } else if (!/^[a-zA-ZáéíóúÁÉÍÓÚñÑüÜ\s]+$/.test(nombre)) {
      setError('nombre', 'Solo letras y espacios'); valid = false;
    }

    // Numéricos: solo verificar que no estén vacíos.
    // Los negativos y rangos los valida el servidor (responde 404).
    if (costeBase === '') { setError('costeBase', 'Campo obligatorio'); valid = false; }
    if (descuento === '')  { setError('descuento', 'Campo obligatorio'); valid = false; }
    if (iva === '')        { setError('iva', 'Campo obligatorio'); valid = false; }

    return valid;
  }

  /* ── Formateo de moneda ─────────────────────────────────────────────── */
  const fmt = n => new Intl.NumberFormat('es-CO', {
    style: 'currency', currency: 'COP', maximumFractionDigits: 2
  }).format(n);

  /* ── Renderizado de resultado ───────────────────────────────────────── */
  function renderSuccess(data) {
    const d = data.desglose;
    resultBox.innerHTML = `
      <div class="result-header">
        <span class="result-id">${escHtml(data.nombre)} <span style="color:var(--muted);font-size:13px">#${escHtml(data.codigo)}</span></span>
        <span class="result-badge badge-ok">HTTP 200 · OK</span>
      </div>
      <div class="breakdown">
        <div class="breakdown-row">
          <span class="label">Costo base</span>
          <span class="value">${fmt(d.costeBase)}</span>
        </div>
        <div class="breakdown-row discount">
          <span class="label">Descuento (${d.descuentoPorcentaje}%)</span>
          <span class="value">− ${fmt(d.descuentoValor)}</span>
        </div>
        <div class="breakdown-row highlight">
          <span class="label">Subtotal con descuento</span>
          <span class="value">${fmt(d.subtotalConDescuento)}</span>
        </div>
        <div class="breakdown-row iva">
          <span class="label">IVA (${d.ivaPorcentaje}%)</span>
          <span class="value">+ ${fmt(d.ivaValor)}</span>
        </div>
      </div>
      <div class="total-box">
        <span class="total-label">Total a pagar</span>
        <span class="total-value">${fmt(d.totalAPagar)}</span>
      </div>`;
    resultBox.classList.add('visible');
  }

  function renderError(status, message) {
    resultBox.innerHTML = `
      <div class="result-header">
        <span class="result-id">Error de validación</span>
        <span class="result-badge badge-err">HTTP ${status} · ERROR</span>
      </div>
      <div class="error-msg">
        <span class="error-code">${status}</span>
        ${escHtml(message)}
      </div>`;
    resultBox.classList.add('visible');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── Click handler ──────────────────────────────────────────────────── */
  btn.addEventListener('click', async () => {
    resultBox.classList.remove('visible');

    if (!validateForm()) return;

    // Loading state
    btn.classList.add('loading');
    btn.disabled = true;

    const payload = {
      codigo:    document.getElementById('codigo').value.trim(),
      nombre:    document.getElementById('nombre').value.trim(),
      costeBase: parseFloat(document.getElementById('costeBase').value),
      iva:       parseFloat(document.getElementById('iva').value),
      descuento: parseFloat(document.getElementById('descuento').value),
    };

    try {
      const response = await fetch(`${API_BASE}/api/calcular`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload),
      });

      const data = await response.json();

      if (response.ok) {
        renderSuccess(data);
      } else {
        // HTTP 404 → error de validación
        renderError(response.status, data.error || 'Error desconocido');
      }

    } catch (err) {
      // Error de red (CORS, sin conexión, etc.)
      renderError(503, 'No se pudo conectar con el microservicio. Verifique que esté corriendo en ' + API_BASE);
      console.error('[Facturación] Error de red:', err);
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  });

  /* ── Enter para calcular ────────────────────────────────────────────── */
  document.querySelectorAll('input').forEach(input => {
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });
  });
</script>
</body>
</html>
